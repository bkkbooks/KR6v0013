body:
  text: 先須啟請八大金剛奉請青除災金剛奉請辟毒金剛奉請黃隨求金剛奉請定除災金剛奉請白淨水金剛奉請赤聲火金剛奉請紫賢金剛奉請大神金剛每欲讀誦持念先須啟請八大金剛經云若善男子善女人持此金剛經纂一遍如轉金剛經三十萬遍感得神禮如滿道天曆元年北山縣有一劉氏女子年十九歲身亡到冥司見閻羅王問女子曰一生已來作何罪福女子答曰一生已來偏持金剛經閻羅王問女子曰何不念取金剛經纂女子曰緣世上無本王言放汝卻迴分明記取經文從如是我聞至信受奉行都計五千一百四十九字有六十九佛自五十一世尊八十五如來三十六須菩提二十六善男子善女人數內有七字四句偈等今言稽首三界尊歸依十方佛我今發弘願受持金剛經上報四重恩下濟三塗苦若有見聞者悉發菩提心盡此一報身同生極樂國一日贊般若遍積善無涯玄奘法師禮拜逐月有十齋日一日有善惡童子下界念定光佛八日齋太子下界念藥師琉璃光佛十四日司命下界念賢劫一千佛十五日齋五道將軍念阿彌陀佛十八日齋閻羅王天子下界念地藏菩薩二十三日齋天大將軍下界念大勢至菩薩二十日齋察命下界念觀世音菩薩二十八日太山府君下界念盧舍那佛二十九日齋四天王下界念藥王菩薩三十齋大梵王下界念釋迦牟尼佛西京龍興寺玄奘法師於西國來大唐國來有十二月禮佛日每月祇在一日正月一日平明時向東方禮佛四拜除罪二百三十劫二月八日雞鳴時向西方禮佛四拜除罪一百二十劫三月七日亥時向西方禮佛四拜除罪一百四十劫四月八日子時向北方禮佛四拜除罪一百二十劫五月五日黃昏時向東方禮佛四拜除罪一千八百劫六月六日黃昏時向東方禮佛四拜除罪一千八百劫七月七日平明時向東方禮佛九拜除罪一千八百劫八月八日卯時向東方禮佛十拜除罪三萬三千劫九月十日寅時向東方禮佛九拜除罪一千八百劫十月一日卯時向南方禮佛九拜除罪一千劫十一月一日黃昏時向南方禮佛九拜除罪一千劫右件禮佛月日之時此是賢聖集會勸諸大地眾生一心於佛月日不得失時令諸眾生所求稱遂若能抄寫使流與人除罪三萬九千六百劫若能教受一人受持除罪恒河沙數劫玄奘法師於西國取經一千卷內掠出此禮佛日月若能有人受持讀誦者獲福無量用力最上功德甚多福高遷如須彌山王深如巨海大如天地廣積無邊功德勸諸善男子善女人虔心重意普願合掌珍重閤家禮敬經文讀誦贊歎罪滅福生信心奉行錄文完
