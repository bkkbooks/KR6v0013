body:
  text: 佛說金剛經纂整理者方廣錩題解金剛經纂中國人自撰佛經一卷本文獻由三部分組成第一部分為啟請八大金剛與持誦功德文其啟請八大金剛部分與敦煌文獻若干金剛經前之啟請八大金剛內容大致相同持誦功德文中則稱持此金剛經纂一遍如轉金剛經三十萬遍第二部分敘述天曆元年北山縣劉姓女子入冥故事謂閻羅王勸說該女子持誦金剛經纂女子回答世上無本閻羅王便傳授經本並稱該經從如是我聞至信受奉行都計五千一百四十九字有六十九佛自五十一世尊八十五如來三十六須菩提二十六善男子善女人數內有七字四句偈等第三部分為玄奘法師十齋日玄奘法師十二月禮佛日以及持誦功德文勸導持齋禮佛念佛稱玄奘法師於西國取經一千卷內掠出此禮佛日月若能有人受持讀誦者獲福無量用力最上功德甚多福高遷如須彌山王深如巨海大如天地廣積無邊功德現發現在敦煌文獻中存有一件被撕為兩號前半為法國國家圖書館藏伯號背面有首題佛說金剛經纂後半為英國大英圖書館藏斯號背面有尾題金剛經纂一卷兩號相綴絲毫不差本文獻價值在於一本文獻是中國民間佛教的產物反映了功德思想的實際流傳形態二十齋日十二禮日等對研究民間佛教實際宗教活動有重要參考意義三從文內閻羅王對金剛經纂的介紹看所謂佛說金剛經纂並非本文獻而應是金剛經本身北山劉姓女子入冥故事的目的是宣揚持誦金剛經的功德這與張居道入冥故事宣揚金光明經黃仕強入冥故事宣揚普賢菩薩說證明經頗為相似四如本文獻之天曆元年確為元文宗天曆元年則本文獻不應是藏經洞文獻從而對藏經洞研究以及敦煌文獻研究帶來一系列問題但元代乃至我國歷代行政區劃均無北山縣因此本文獻之天曆元年是否真實的歷史年號尚需研究總之本文獻的發現對中國佛教及敦煌學研究提出不少新課題均有待深入研究本文獻未為我國歷代大藏經所收歷代經錄亦均無記載錄文以伯號背面與斯號背面為底本無校本錄文
